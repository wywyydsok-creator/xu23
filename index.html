<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Happy 23rd Birthday</title>

  <!-- Google Fonts: Noto Serif SC for elegant Chinese typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ========== LOADING SCREEN ========== -->
  <div class="loading-screen" aria-hidden="true">
    <div class="loading-heart">??</div>
    <div class="loading-text">???...</div>
 </div>

  <!-- ====== CELEBRATION CONTAINER ====== -->
  <div id="celebration" aria-hidden="true"></div>

 <!-- ========== MUSIC CONTROL ========== -->
 <!-- Fixed top-right music controller.
       Replace music/bgm.mp3 with your own BGM file.
       Supported formats: mp3, ogg, wav -->
  <div class="music-control" role="toolbar" aria-label="????">
    <button class="music-toggle" title="????" aria-label="??/????">
      <!-- Music note icon -->
      <svg class="icon-music" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
      <!-- Audio waveform animation -->
      <div class="waveform">
        <span class="waveform-bar"></span>
        <span class="waveform-bar"></span>
        <span class="waveform-bar"></span>
        <span class="waveform-bar"></span>
        <span class="waveform-bar"></span>
        <span class="waveform-bar"></span>
        <span class="waveform-bar"></span>
      </div>
   </button>
   <div class="volume-slider">
      <svg class="icon-volume" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
        <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
      </svg>
      <input type="range" min="0" max="1" step="0.05" value="0.5" aria-label="??">
    </div>
    <button class="music-stop" title="停止" aria-label="停止播放">
      <svg class="icon-stop" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <rect x="6" y="6" width="12" height="12" rx="1.5"/>
      </svg>
    </button>
 </div>

  <!-- ====== NAVIGATION ====== -->
  <nav class="page-nav" aria-label="页面导航">
    <button class="nav-toggle" aria-label="导航菜单">
      <span class="nav-icon"><span></span><span></span><span></span></span>
    </button>
    <ul class="nav-menu">
      <li><a href="#hero">首页</a></li>
      <li><a href="#story">故事</a></li>
      <li><a href="#photos">照片</a></li>
      <li><a href="#message">留言</a></li>
    </ul>
  </nav>

 <!-- ========== HERO SECTION ========== -->
 <section class="hero" id="hero">
    <div class="hero-bg-number" aria-hidden="true">23</div>
    <div class="hero-candle-glow"></div>

    <div class="hero-content">
    <p class="hero-title" style="margin-top:-5em;margin-bottom:200px">王旭生日快乐</p>


      <!-- ===== The 3-Tier Birthday Cake ===== -->
      <!--
        The cake is built with pure CSS ? no images needed.
        It consists of 3 tiers, a plate, and 2 candles ("2" and "3") with animated flames.
        The candle flames have a breathing/flickering effect.
      -->
      <div class="cake-container">
        <div class="cake">

          <!-- Candles "23" -->
          <div class="candle-group">
            <div class="candle candle-2">
              <div class="candle-body"><span class="candle-number">2</span></div>
            </div>
            <div class="candle candle-3">
              <div class="candle-body"><span class="candle-number">3</span></div>
            </div>
          </div>

          <!-- Flames -->
          <div class="flame-group">
            <div class="candle-flame"></div>
            <div class="candle-flame"></div>
          </div>

          <!-- Tier 1 (top) -->
          <div class="cake-tier tier-1">
            <div class="tier-body">
              <div class="tier-rose tier-rose-3"></div>
              <div class="tier-rose tier-rose-4"></div>
            </div>
          </div>

          <!-- Tier 2 (middle) with frosting border and decorative dots -->
          <div class="cake-tier tier-2">
            <div class="frosting-border"></div>
            <div class="tier-body">
              <div class="deco-dots">
                <span></span><span></span><span></span><span></span>
              </div>
            </div>
          </div>

          <!-- Tier 3 (bottom, largest) with frosting drips -->
          <div class="cake-tier tier-3">
            <div class="tier-body">
              <div class="frosting-drips">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
              </div>
              <div class="tier-rose tier-rose-1"></div>
              <div class="tier-rose tier-rose-2"></div>
            </div>
          </div>

        </div>
        <!-- Plate -->
        <div class="cake-plate"></div>
      </div>
    </div>

    <!-- Scroll indicator -->
    <div class="scroll-indicator">
      <span></span>
      <div class="scroll-arrow"></div>
    </div>
  </section>

  <!-- ========== STORY SECTION ========== -->
  <!--
    Story content is loaded from texts/story.txt.
    Edit that file to update the story content.
    Format: Title (on its own line), optionally followed by a date line,
    then paragraphs of text.
  -->
  <section class="section story-section" id="story">
    <div class="section-inner">
      <div class="section-header reveal">
        <p class="section-label">我们的相遇</p>
        <h2 class="section-title">About us</h2>
        <p class="section-subtitle"></p>
      </div>
      <div class="story-timeline">
        <!-- Cards are dynamically populated from texts/story.txt -->
      </div>
    </div>
  </section>

  <!-- ========== PHOTOS SECTION ========== -->
  <!--
    Photo grid with placeholder gradients.
    To add real photos:
    1. Place your images in the photos/ directory.
    2. Replace the .photo-placeholder div in script.js with:
       <img src="photos/your-photo.jpg" alt="??">
    3. Or replace the gradient class with a background-image style.
  -->
  <section class="section photos-section" id="photos">
    <div class="section-inner">
      <div class="section-header reveal">
        <p class="section-label"></p>
        <h2 class="section-title">一些特别的照片</h2>
        <p class="section-subtitle"></p>
      </div>
      <div class="photo-grid">
        <!-- Photos are dynamically populated from script.js -->
      </div>
    </div>
  </section>

  <!-- ========== MESSAGE SECTION ========== -->
  <!--
    Birthday message loaded from texts/message.txt.
    Edit that file to change the birthday wishes.
    The message appears line by line with a staggered entrance animation.
    Pink hearts and light particles float upward while this section is visible.
  -->
  <section class="section message-section" id="message">
    <canvas id="particles-canvas"></canvas>
    <div class="section-inner">
      <div class="message-content">
        <div class="message-text">
          <!-- Lines are dynamically populated from texts/message.txt -->
        </div>
        <div class="message-signoff"></div>
      </div>
    </div>
  </section>

  <!-- ========== FOOTER ========== -->
  <footer class="site-footer">
    <span class="footer-heart">??</span>
    <p class="footer-text">2022 ? ???23? ? ????</p>
  </footer>

  <!-- ========== BACKGROUND MUSIC ========== -->
  <!--
    Place your BGM file at: music/bgm.mp3
    Supported formats: mp3, ogg, wav
    The music is muted by default (browser autoplay policy).
    Click the music button in the top-right corner to start playback.
  -->
  <audio id="bgm" preload="auto" loop autoplay muted>
    <source src="music/bgm.mp3" type="audio/mpeg">
    <source src="music/bgm.ogg" type="audio/ogg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
